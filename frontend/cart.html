<!DOCTYPE html>
<html>

<head>

    <title>My Cart</title>

    <link
    rel="stylesheet"
    href="cart.css">

</head>

<body>

    <nav class="navbar">

        <div class="nav-left">

            <h2>E-Shop</h2>

        </div>

        <div class="nav-right">

            <a href="store.html">
                Store
            </a>

            <a href="orders.html">
                Track Orders
            </a>

        </div>

    </nav>

    <div class="cart-container">

        <h1>My Cart</h1>

        <div id="cartItems"></div>

        <div class="cart-summary">

            <h3>
                Total Items:
                <span id="itemCount">0</span>
            </h3>

            <h2>
                Total Amount:
                ₹<span id="totalPrice">0</span>
            </h2>

            <button
            class="order-btn"
            onclick="openPaymentModal()">

                Place Order

            </button>

        </div>

    </div>

    <div
    id="paymentModal"
    class="modal">

        <div class="modal-content">

            <h2>Select Payment Method</h2>

            <label>

                <input
                type="radio"
                name="payment"
                value="Cash On Delivery">

                Cash On Delivery

            </label>

            <br><br>

            <label>

                <input
                type="radio"
                name="payment"
                value="Online Payment">

                Online Payment

            </label>

            <br><br>

            <button onclick="placeOrder()">

                Confirm Order

            </button>

        </div>

    </div>

    <script src="cart.js"></script>

</body>

</html>
