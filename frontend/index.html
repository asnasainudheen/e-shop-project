<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>E-Shop</title>

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body class="auth-page"></body>

    <div class="container">

        <div class="auth-card">

            <h1>E-Shop</h1>

            <div class="tabs">

                <button
                    id="loginTab"
                    onclick="showLogin()">

                    Login

                </button>

                <button
                    id="registerTab"
                    onclick="showRegister()">

                    Register

                </button>

            </div>

            <!-- Login Form -->

            <div id="loginForm">

                <input
                    type="email"
                    id="loginEmail"
                    placeholder="Email">

              <div class="password-box">
    <input
        type="password"
        id="loginPassword"
        placeholder="Password">

    <span
        class="toggle-password"
        onclick="togglePassword('loginPassword', this)">
        👁️
    </span>
</div>

                <button onclick="loginUser()">

                    Login

                </button>

            </div>

            <!-- Register Form -->

            <div
                id="registerForm"
                style="display:none;">

                <input
                    type="text"
                    id="name"
                    placeholder="Name">

                <input
                    type="email"
                    id="email"
                    placeholder="Email">

               <div class="password-box">
    <input
        type="password"
        id="registerPassword"
        placeholder="Password">

    <span
        class="toggle-password"
        onclick="togglePassword('registerPassword', this)">
        👁️
    </span>
</div>

                <button onclick="registerUser()">

                    Register

                </button>

            </div>

        </div>

    </div>

    <script src="login.js"></script>

</body>

</html>
